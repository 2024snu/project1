<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 세련된 첫 웹페이지</title>
    <style>
        /* 이 부분이 웹페이지를 꾸미는 CSS 코드입니다 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6; /* 부드러운 회색 배경 */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: white;
            padding: 40px;
            border-radius: 12px; /* 둥근 모서리 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* 은은한 그림자 */
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 15px;
        }
        p {
            color: #7f8c8d;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #3498db; /* 푸른색 버튼 */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #2980b9; /* 마우스 올렸을 때 더 어두운 푸른색 */
        }
    </style>
</head>
<body>

    <!-- 화면에 보일 실제 내용들 (구조) -->
    <div class="card">
        <h1>나의 첫 웹페이지 🚀</h1>
        <p>단순한 텍스트 페이지에서 CSS를 더해 깔끔하고 세련된 카드 레이아웃 형태로 변신했습니다!</p>
        <a href="#" class="btn">자세히 알아보기</a>
    </div>

</body>
</html>
